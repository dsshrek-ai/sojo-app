<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SOJO">
  <meta name="description" content="South Jordan Oratorio Society — Singer Directory">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>SOJO Singer Directory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SCREEN: Home / Directory -->
  <div id="screen-home" class="screen active">
    <header class="app-header">
      <div class="header-content">
        <div class="header-title">
          <span class="header-icon">🎵</span>
          <div>
            <h1>SOJO Directory</h1>
            <p id="last-updated" class="last-updated"></p>
          </div>
        </div>
        <div class="header-actions">
          <button id="btn-attendance" class="icon-btn" title="Take Attendance" aria-label="Attendance">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </button>
          <button id="btn-add" class="icon-btn" title="Add Singer" aria-label="Add Singer">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          </button>
          <button id="btn-refresh" class="icon-btn" title="Refresh" aria-label="Refresh">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          </button>
        </div>
      </div>
    </header>

    <div class="search-filter-bar">
      <div class="search-wrapper">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search singers…" autocomplete="off" autocorrect="off" spellcheck="false">
        <button id="btn-clear-search" class="clear-btn hidden">×</button>
      </div>
      <div class="filter-row">
        <div class="select-wrapper">
          <select id="section-filter">
            <option value="all">All Sections</option>
            <option value="Soprano">Soprano</option>
            <option value="Alto">Alto</option>
            <option value="Tenor">Tenor</option>
            <option value="Bass">Bass</option>
          </select>
        </div>
        <div class="select-wrapper">
          <select id="position-filter">
            <option value="all">All Positions</option>
          </select>
        </div>
      </div>
    </div>

    <div id="singer-count" class="singer-count"></div>
    <div id="singer-list" class="singer-list"></div>

    <div id="loading-overlay" class="loading-overlay">
      <div class="spinner"></div>
      <p>Loading singers…</p>
    </div>
  </div>

  <!-- SCREEN: Singer Profile -->
  <div id="screen-profile" class="screen">
    <header class="app-header">
      <div class="header-content">
        <button id="btn-back-profile" class="icon-btn" aria-label="Back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <span class="header-back-label">Directory</span>
        <div class="header-actions">
          <button id="btn-edit" class="icon-btn" title="Edit Singer" aria-label="Edit">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
      </div>
    </header>
    <div id="profile-content" class="profile-content"></div>
  </div>

  <!-- SCREEN: Edit Singer -->
  <div id="screen-edit" class="screen">
    <header class="app-header">
      <div class="header-content">
        <button id="btn-back-edit" class="icon-btn" aria-label="Back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <span class="header-back-label" id="edit-title">Edit Singer</span>
        <button id="btn-save" class="save-btn">Save</button>
      </div>
    </header>
    <div id="edit-content" class="edit-content"></div>
  </div>

  <!-- SCREEN: Attendance -->
  <div id="screen-attendance" class="screen">
    <header class="app-header">
      <div class="header-content">
        <button id="btn-back-attendance" class="icon-btn" aria-label="Back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <span class="header-back-label">Attendance</span>
      </div>
    </header>
    <div id="attendance-content" class="attendance-content"></div>
  </div>

  <!-- PIN Modal -->
  <div id="pin-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h2>Admin Access</h2>
      <p>Enter PIN to continue</p>
      <div class="pin-dots">
        <span class="pin-dot" id="dot-0"></span>
        <span class="pin-dot" id="dot-1"></span>
        <span class="pin-dot" id="dot-2"></span>
        <span class="pin-dot" id="dot-3"></span>
      </div>
      <div id="pin-error" class="pin-error hidden">Incorrect PIN</div>
      <div class="pin-keypad">
        <button class="pin-key" data-key="1">1</button>
        <button class="pin-key" data-key="2">2</button>
        <button class="pin-key" data-key="3">3</button>
        <button class="pin-key" data-key="4">4</button>
        <button class="pin-key" data-key="5">5</button>
        <button class="pin-key" data-key="6">6</button>
        <button class="pin-key" data-key="7">7</button>
        <button class="pin-key" data-key="8">8</button>
        <button class="pin-key" data-key="9">9</button>
        <button class="pin-key pin-cancel" data-key="cancel">✕</button>
        <button class="pin-key" data-key="0">0</button>
        <button class="pin-key pin-delete" data-key="delete">⌫</button>
      </div>
    </div>
  </div>

  <!-- Update Banner -->
  <div id="update-banner" class="update-banner hidden">
    <span>🔄 A new version is available!</span>
    <button id="btn-update">Update Now</button>
    <button id="btn-dismiss-update" class="dismiss-update">Later</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
